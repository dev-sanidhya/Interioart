<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InterioArty — Lead Inbox</title>
<link rel="stylesheet" href="css/style.css" />
<style>
  body { cursor: default; background: var(--ink); color: var(--bone); }
  .crm-wrap { max-width: 980px; margin: 0 auto; padding: 160px 7vw 120px; }
  .crm-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: var(--sp-5); border-bottom: 1px solid var(--line-on-ink); padding-bottom: var(--sp-4); }
  .crm-head h1 { font-family: var(--serif); font-weight: 400; font-size: var(--t-h1); }
  .crm-head p { color: rgba(245,242,234,0.5); margin-top: var(--sp-1); }
  .live-pill { display: flex; align-items: center; gap: 8px; font-size: var(--t-label); letter-spacing: 0.08em; text-transform: uppercase; color: rgba(245,242,234,0.6); }
  .live-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: #9fae86; animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .lead-row { border-top: 1px solid var(--line-on-ink); padding: var(--sp-3) 0; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: var(--sp-3); align-items: center; opacity: 0; transform: translateY(-8px); animation: dropin 0.6s ease forwards; }
  .lead-list .lead-row:last-child { border-bottom: 1px solid var(--line-on-ink); }
  @keyframes dropin { to { opacity: 1; transform: translateY(0); } }
  .lead-field label { display: block; font-size: 0.64rem; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(245,242,234,0.4); margin-bottom: 6px; }
  .lead-field span { font-size: 0.95rem; }
  .lead-badge { font-family: var(--serif); font-style: italic; color: var(--accent-soft); font-size: 0.9rem; white-space: nowrap; }
  .empty-state { text-align: center; padding: var(--sp-7) 20px; color: rgba(245,242,234,0.4); border-top: 1px solid var(--line-on-ink); }
  .empty-state b { display: block; font-family: var(--serif); font-style: italic; font-size: 1.4rem; color: var(--bone); margin-bottom: 10px; font-weight: 400; }
  .toast { position: fixed; top: 24px; right: 24px; background: var(--bone); color: var(--ink); padding: 14px 20px; font-size: 0.86rem; transform: translateX(140%); transition: transform 0.6s var(--ease); z-index: 300; }
  .toast.show { transform: translateX(0); }
  .stats-row { display: flex; gap: var(--sp-5); margin-bottom: var(--sp-5); }
  .stat b { display: block; font-family: var(--serif); font-size: 1.8rem; font-weight: 400; }
  .stat span { font-size: var(--t-label); text-transform: uppercase; letter-spacing: 0.06em; color: rgba(245,242,234,0.45); }
</style>
</head>
<body>
<div class="grain"></div>
<div class="crm-wrap">
  <div class="crm-head">
    <div>
      <h1 class="serif">Lead Inbox</h1>
      <p>Every conversation Arty has qualified, landing here in real time.</p>
    </div>
    <div class="live-pill"><span class="dot"></span> Live</div>
  </div>

  <div class="stats-row">
    <div class="stat"><b id="statTotal">0</b><span>Total Leads</span></div>
    <div class="stat"><b id="statToday">0</b><span>Today</span></div>
    <div class="stat"><b>&lt; 1 min</b><span>Avg. Reply Time</span></div>
  </div>

  <div id="leadList" class="lead-list"></div>
</div>

<div class="toast" id="toast">New lead captured by Arty</div>

<script src="js/crm.js"></script>
</body>
</html>
